name: Publish to npm

# Fires when a GitHub release is published (including pre-releases).
# Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret required.
# Setup: for each package on npmjs.com, add a Trusted Publisher entry:
#   Owner: relaya-chat  |  Repository: sdk  |  Workflow: publish.yml
on:
  release:
    types: [published]

jobs:
  publish:
    name: Build, test, and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm OIDC trusted publishing

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      # --if-present skips workspaces that have no test script (e.g. @relaya-chat/react)
      - name: Run tests
        run: npm test --workspaces --if-present

      - name: Build all packages
        run: npm run build

      # Publishes all workspaces where "private" is not true.
      # --provenance attaches build attestation (requires id-token: write above).
      - name: Publish to npm
        run: npm publish --workspaces --access public --provenance
