name: Publish to npm

# Fires when a GitHub release is published (including pre-releases).
# Requires a repository secret named NPM_TOKEN with publish access
# to the @relaya-chat npm organisation.
on:
  release:
    types: [published]

jobs:
  publish:
    name: Build, test, and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4

      - name: Set up Node.js 22 with npm registry
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      # --if-present skips workspaces that have no test script (e.g. @relaya-chat/react)
      - name: Run tests
        run: npm test --workspaces --if-present

      - name: Build all packages
        run: npm run build

      # Publishes all workspaces where "private" is not true.
      # NODE_AUTH_TOKEN is consumed by the npm registry config written by setup-node.
      - name: Publish to npm
        run: npm publish --workspaces --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
