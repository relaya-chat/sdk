name: Publish to npm

# Fires when a GitHub release is published (including pre-releases).
# Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret required.
# Setup: for each package on npmjs.com, add a Trusted Publisher entry:
#   Owner: relaya-chat  |  Repository: sdk  |  Workflow: publish.yml
on:
  release:
    types: [published]

jobs:
  publish:
    name: Build, test, and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm OIDC trusted publishing

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4

      - name: Set up Node.js 22 with npm registry
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # npm Trusted Publishing (OIDC) requires npm >= 11.5.1.
      # Node 22 ships npm v10 which cannot perform the OIDC handshake.
      - name: Upgrade npm to latest (required for OIDC Trusted Publishing)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      # Build first so workspace cross-package imports (e.g. react-native → core) resolve correctly.
      - name: Build all packages
        run: npm run build

      # --if-present skips workspaces that have no test script
      - name: Run tests
        run: npm test --workspaces --if-present

      # Publishes all workspaces where "private" is not true.
      # Provenance attestations are published automatically by npm Trusted
      # Publishing — the --provenance flag is not required here.
      - name: Publish to npm
        run: npm publish --workspaces --access public
