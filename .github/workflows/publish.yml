name: Publish to npm

# Fires when a GitHub release is published (including pre-releases).
# Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret required.
# Setup: for each package on npmjs.com, add a Trusted Publisher entry:
#   Owner: relaya-chat  |  Repository: sdk  |  Workflow: publish.yml
on:
  release:
    types: [published]

jobs:
  publish:
    name: Build, test, and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm OIDC trusted publishing

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4

      - name: Set up Node.js 22 with npm registry
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      # --if-present skips workspaces that have no test script (e.g. @relaya-chat/react)
      - name: Run tests
        run: npm test --workspaces --if-present

      - name: Build all packages
        run: npm run build

      # Publishes all workspaces where "private" is not true.
      # --provenance attaches build attestation (requires id-token: write above).
      # --loglevel http shows the OIDC exchange and PUT request details for diagnostics.
      - name: Publish to npm
        run: npm publish --workspaces --access public --provenance --loglevel http

      - name: Upload npm debug log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: npm-debug-log
          path: /home/runner/.npm/_logs/
          retention-days: 3
